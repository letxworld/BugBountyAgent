<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Targets — BugBountyAgent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <span class="logo">🐞</span>
                <span class="brand-text">BugBountyAgent</span>
                <span class="badge-version">v0.1</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/targets" class="nav-item active" data-page="targets">
                    <span class="nav-icon">🎯</span>
                    <span>Targets</span>
                </a>
                <a href="/findings" class="nav-item" data-page="findings">
                    <span class="nav-icon">🔍</span>
                    <span>Findings</span>
                </a>
                <a href="/chains" class="nav-item" data-page="chains">
                    <span class="nav-icon">🔗</span>
                    <span>Chains</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="status-indicator" id="connectionStatus">
                    <span class="status-dot connected"></span>
                    <span class="status-text">Connected</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle">☰</button>
                    <h1>🎯 Targets</h1>
                    <span class="subtitle">Manage your bug bounty targets</span>
                </div>
                <div class="header-right">
                    <button class="btn btn-secondary btn-sm" onclick="refreshTargets()">🔄 Refresh</button>
                    <button class="btn btn-primary btn-sm" onclick="showAddTarget()">➕ Add Target</button>
                </div>
            </header>

            <!-- Targets Table -->
            <section class="targets-section" style="flex:1; display:flex; flex-direction:column;">
                <div class="targets-table-container" style="flex:1; overflow-y:auto;">
                    <table class="findings-table" id="targetsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>URL</th>
                                <th>Status</th>
                                <th>Findings</th>
                                <th>Added</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="targetsTableBody">
                            <tr>
                                <td colspan="6" class="text-center text-muted">No targets found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Add Target</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="targetUrl">Target URL</label>
                    <input type="text" id="targetUrl" placeholder="https://example.com" />
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveTarget()">Add Target</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
