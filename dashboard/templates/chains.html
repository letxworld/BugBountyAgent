<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chains — BugBountyAgent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <span class="logo">🐞</span>
                <span class="brand-text">BugBountyAgent</span>
                <span class="badge-version">v0.1</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/targets" class="nav-item" data-page="targets">
                    <span class="nav-icon">🎯</span>
                    <span>Targets</span>
                </a>
                <a href="/findings" class="nav-item" data-page="findings">
                    <span class="nav-icon">🔍</span>
                    <span>Findings</span>
                </a>
                <a href="/chains" class="nav-item active" data-page="chains">
                    <span class="nav-icon">🔗</span>
                    <span>Chains</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="status-indicator" id="connectionStatus">
                    <span class="status-dot connected"></span>
                    <span class="status-text">Connected</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle">☰</button>
                    <h1>🔗 Attack Chains</h1>
                    <span class="subtitle">Correlated vulnerability paths</span>
                </div>
                <div class="header-right">
                    <button class="btn btn-secondary btn-sm" onclick="refreshChains()">🔄 Refresh</button>
                </div>
            </header>

            <section class="stats-grid" style="margin-bottom:20px;">
                <div class="stat-card">
                    <div class="stat-icon">🔗</div>
                    <div class="stat-info">
                        <span class="stat-value" id="statTotal">0</span>
                        <span class="stat-label">Total Chains</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <span class="stat-value" id="statComplete">0</span>
                        <span class="stat-label">Completed</span>
                    </div>
                </div>
            </section>

            <section style="flex:1; overflow-y:auto;" id="chainsList">
                <div class="text-center text-muted" style="padding:40px;">No attack chains found</div>
            </section>
        </main>
    </div>

    <!-- Chain Detail Modal -->
    <div class="modal-overlay" id="chainDetailModal">
        <div class="modal" style="max-width:700px;">
            <div class="modal-header">
                <h3 id="chainDetailTitle">Chain Details</h3>
                <button class="modal-close" onclick="closeChainDetail()">✕</button>
            </div>
            <div class="modal-body" id="chainDetailBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeChainDetail()">Close</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
